<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="가계부" />
<meta name="theme-color" content="#ffffff" />
<title>가계부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #ebebeb;
  --text: #111111;
  --text2: #666666;
  --text3: #999999;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --blue: #185FA5;
  --red: #A32D2D;
  --radius: 10px;
  --radius-lg: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111111;
    --bg2: #1e1e1e;
    --bg3: #2a2a2a;
    --text: #f0f0f0;
    --text2: #999999;
    --text3: #666666;
    --border: rgba(255,255,255,0.12);
    --border2: rgba(255,255,255,0.22);
    --blue: #5B9FD4;
    --red: #D46666;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
.tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; background: var(--bg); border-top: 0.5px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.tab { flex: 1; padding: 10px 4px 8px; text-align: center; font-size: 11px; color: var(--text3); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.tab i { font-size: 22px; }
.tab.active { color: var(--text); }
.screen { display: none; padding: 16px 16px 0; }
.screen.active { display: block; }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.month-nav button { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text2); padding: 4px 12px; }
.month-nav span { font-size: 17px; font-weight: 500; }
.s-main { background: var(--bg2); border-radius: var(--radius); padding: 14px 16px 12px; margin-bottom: 8px; }
.s-main .lbl { font-size: 12px; color: var(--text2); margin-bottom: 3px; }
.s-main .val { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
.s-main .sub { font-size: 12px; }
.s-today { background: var(--bg2); border-radius: var(--radius); padding: 11px 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
.s-today .lbl { font-size: 12px; color: var(--text2); }
.s-today .val { font-size: 16px; font-weight: 500; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 12px; }
.cal-head { text-align: center; font-size: 11px; color: var(--text3); padding: 4px 0; }
.cal-day { min-height: 54px; border-radius: 8px; padding: 4px 3px; cursor: pointer; border: 0.5px solid transparent; display: flex; flex-direction: column; align-items: flex-start; }
.cal-day:active { background: var(--bg2); }
.cal-day.today { border-color: var(--border2); }
.cal-day.selected { background: var(--bg2); border-color: var(--border2); }
.cal-day .dnum { font-size: 12px; line-height: 1.4; }
.cal-day .damount { font-size: 8.5px; color: var(--blue); font-weight: 500; margin-top: 2px; line-height: 1.3; word-break: keep-all; }
.cal-day.has-fixed .dnum::after { content: '·'; color: #3B6D11; margin-left: 1px; }
.cal-day.empty { cursor: default; }
.section-title { font-size: 13px; color: var(--text2); margin: 14px 0 8px; font-weight: 500; }
.entries-list { display: flex; flex-direction: column; gap: 6px; }
.entry-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); }
.entry-row .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.entry-row .info { flex: 1; min-width: 0; }
.entry-row .desc { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entry-row .meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
.entry-row .amt { font-size: 14px; font-weight: 500; color: var(--blue); flex-shrink: 0; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 17px; padding: 2px 4px; }
.empty-msg { text-align: center; color: var(--text3); font-size: 13px; padding: 24px 0; }
.chart-bar-wrap { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-row .cat-name { font-size: 12px; width: 56px; flex-shrink: 0; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 16px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; }
.bar-row .bar-amt { font-size: 11px; color: var(--text2); min-width: 60px; text-align: right; }
.form-box { display: flex; flex-direction: column; gap: 10px; padding: 14px; background: var(--bg2); border-radius: var(--radius-lg); margin-bottom: 14px; }
.form-box input, .form-box select { width: 100%; font-size: 14px; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); }
.btn-primary { background: var(--text); color: var(--bg); border: none; border-radius: var(--radius); padding: 12px; font-size: 15px; cursor: pointer; font-weight: 500; width: 100%; }
.btn-secondary { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 12px; font-size: 15px; cursor: pointer; color: var(--text2); width: 100%; }
.fixed-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.day-badge { font-size: 11px; background: #E6F1FB; color: #185FA5; padding: 3px 8px; border-radius: 12px; white-space: nowrap; flex-shrink: 0; }
.cat-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; padding: 6px 0; }
.color-opt { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
.color-opt.sel { border-color: var(--text); }
/* FAB */
.fab { position: fixed; bottom: calc(64px + env(safe-area-inset-bottom) + 16px); right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.18); z-index: 90; }
/* Modal */
.modal-wrap { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; }
.modal-wrap.open { display: flex; }
.modal { background: var(--bg); border-radius: 20px 20px 0 0; padding: 20px 16px calc(20px + env(safe-area-inset-bottom)); width: 100%; max-height: 92vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 500; margin-bottom: 14px; }
/* Keypad */
.kp-amount-area { text-align: center; padding: 8px 0 10px; }
.kp-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.kp-amount { font-size: 38px; font-weight: 500; min-height: 48px; letter-spacing: -1px; }
.kp-amount.placeholder { color: var(--text3); }
.suggest-row { display: flex; flex-wrap: wrap; gap: 7px; min-height: 34px; padding: 2px 0 10px; }
.suggest-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; font-size: 13px; color: var(--text); }
.suggest-chip:active { opacity: 0.6; }
.chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.kp-meta { display: flex; flex-direction: column; gap: 9px; padding: 4px 0 12px; }
.kp-meta input, .kp-meta select { width: 100%; font-size: 14px; padding: 9px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); }
.keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
.kp-btn { height: 56px; border: none; background: var(--bg2); border-radius: var(--radius); font-size: 22px; font-weight: 500; cursor: pointer; color: var(--text); display: flex; align-items: center; justify-content: center; }
.kp-btn:active { opacity: 0.55; }
.kp-btn.zero { grid-column: span 2; }
.kp-actions { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; }
</style>
</head>
<body>

<!-- 달력 -->
<div id="screen-calendar" class="screen active">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="s-main">
    <div class="lbl">이번 달 지출</div>
    <div class="val" id="month-total">₩0</div>
    <div class="sub" id="vs-prev"></div>
  </div>
  <div class="s-today">
    <div><div class="lbl">오늘 지출</div><div class="val" id="today-total">₩0</div></div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="day-detail"></div>
</div>

<!-- 통계 -->
<div id="screen-stats" class="screen">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="stats-month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="s-main">
    <div class="lbl">총 지출</div>
    <div class="val" id="stats-total">₩0</div>
    <div class="sub" id="stats-vs-prev"></div>
  </div>
  <div class="s-today" style="margin-bottom:14px">
    <div><div class="lbl">일평균</div><div class="val" id="stats-daily">₩0</div></div>
  </div>
  <div class="section-title">카테고리별 지출</div>
  <div class="chart-bar-wrap" id="cat-chart"></div>
</div>

<!-- 고정지출 -->
<div id="screen-fixed" class="screen">
  <div class="section-title" style="margin-top:0">매월 자동 반영 고정지출</div>
  <div id="fixed-list"></div>
  <div class="section-title">고정지출 추가</div>
  <div class="form-box">
    <input id="fx-desc" placeholder="항목 이름 (예: 월세, 넷플릭스)" />
    <input id="fx-amt" type="number" inputmode="numeric" placeholder="금액 (원)" />
    <select id="fx-cat"></select>
    <input id="fx-day" type="number" inputmode="numeric" min="1" max="31" placeholder="매월 며칠? (1~31)" />
    <button class="btn-primary" onclick="addFixed()">고정지출 추가</button>
  </div>
</div>

<!-- 카테고리 -->
<div id="screen-cats" class="screen">
  <div class="section-title" style="margin-top:0">카테고리 목록</div>
  <div id="cat-list"></div>
  <div class="section-title">새 카테고리</div>
  <div class="form-box">
    <input id="new-cat-name" placeholder="카테고리 이름" />
    <div style="font-size:13px;color:var(--text2)">색상</div>
    <div class="color-grid" id="color-picker-new"></div>
    <button class="btn-primary" onclick="addCat()">추가</button>
  </div>
</div>

<!-- 하단 탭바 -->
<div class="tab-bar">
  <div class="tab active" onclick="showTab('calendar',this)" id="tab-calendar">
    <i class="ti ti-calendar"></i><span>달력</span>
  </div>
  <div class="tab" onclick="showTab('stats',this)" id="tab-stats">
    <i class="ti ti-chart-bar"></i><span>통계</span>
  </div>
  <div class="tab" onclick="showTab('fixed',this)" id="tab-fixed">
    <i class="ti ti-refresh"></i><span>고정지출</span>
  </div>
  <div class="tab" onclick="showTab('cats',this)" id="tab-cats">
    <i class="ti ti-tag"></i><span>카테고리</span>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAdd()" aria-label="지출 추가">+</button>

<!-- 지출 추가 모달 -->
<div class="modal-wrap" id="entry-modal" onclick="bgClose('entry-modal',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="kp-amount-area">
      <div class="kp-label" id="kp-date-label">오늘</div>
      <div class="kp-amount placeholder" id="kp-display">얼마 썼어요?</div>
    </div>
    <div class="suggest-row" id="suggest-row"></div>
    <div class="kp-meta">
      <input id="kp-desc" placeholder="어디서? (비워두면 '지출'로 저장)" />
      <select id="kp-cat"></select>
      <input id="kp-date" type="date" onchange="updateDateLabel()" />
    </div>
    <div class="keypad">
      <button class="kp-btn" onclick="kpPress('1')">1</button>
      <button class="kp-btn" onclick="kpPress('2')">2</button>
      <button class="kp-btn" onclick="kpPress('3')">3</button>
      <button class="kp-btn" onclick="kpPress('4')">4</button>
      <button class="kp-btn" onclick="kpPress('5')">5</button>
      <button class="kp-btn" onclick="kpPress('6')">6</button>
      <button class="kp-btn" onclick="kpPress('7')">7</button>
      <button class="kp-btn" onclick="kpPress('8')">8</button>
      <button class="kp-btn" onclick="kpPress('9')">9</button>
      <button class="kp-btn zero" onclick="kpPress('0')">0</button>
      <button class="kp-btn" onclick="kpDel()"><i class="ti ti-backspace"></i></button>
    </div>
    <div class="kp-actions">
      <button class="btn-secondary" onclick="closeModal('entry-modal')">취소</button>
      <button class="btn-primary" onclick="saveEntry()">기록하기</button>
    </div>
  </div>
</div>

<!-- 지출 수정 모달 -->
<div class="modal-wrap" id="edit-modal" onclick="bgClose('edit-modal',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">지출 수정</div>
    <div class="form-box" style="background:none;padding:0">
      <input id="ed-desc" placeholder="내용" />
      <input id="ed-amt" type="number" inputmode="numeric" placeholder="금액 (원)" />
      <select id="ed-cat"></select>
      <input id="ed-date" type="date" />
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-secondary" onclick="closeModal('edit-modal')">취소</button>
        <button class="btn-primary" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 고정지출 수정 모달 -->
<div class="modal-wrap" id="edit-fixed-modal" onclick="bgClose('edit-fixed-modal',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">고정지출 수정</div>
    <div class="form-box" style="background:none;padding:0">
      <input id="ef-desc" placeholder="항목 이름" />
      <input id="ef-amt" type="number" inputmode="numeric" placeholder="금액 (원)" />
      <select id="ef-cat"></select>
      <input id="ef-day" type="number" inputmode="numeric" min="1" max="31" placeholder="매월 며칠?" />
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn-secondary" onclick="closeModal('edit-fixed-modal')">취소</button>
        <button class="btn-primary" onclick="saveEditFixed()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 카테고리 수정 모달 -->
<div class="modal-wrap" id="edit-cat-modal" onclick="bgClose('edit-cat-modal',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">카테고리 수정</div>
    <div class="form-box" style="background:none;padding:0">
      <input id="edit-cat-name" placeholder="카테고리 이름" />
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">색상</div>
      <div class="color-grid" id="color-picker-edit"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <button class="btn-secondary" onclick="closeModal('edit-cat-modal')">취소</button>
        <button class="btn-primary" onclick="saveEditCat()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
const PALETTE=['#378ADD','#1D9E75','#BA7517','#D4537E','#7F77DD','#D85A30','#639922','#888780','#185FA5','#0F6E56','#993556','#534AB7'];
const DEFAULT_CATS=[
  {id:'c1',name:'식비',color:'#378ADD'},{id:'c2',name:'교통',color:'#1D9E75'},
  {id:'c3',name:'카페',color:'#BA7517'},{id:'c4',name:'쇼핑',color:'#D4537E'},
  {id:'c5',name:'문화',color:'#7F77DD'},{id:'c6',name:'의료',color:'#D85A30'},
  {id:'c7',name:'구독',color:'#639922'},{id:'c8',name:'기타',color:'#888780'}
];

let viewYear, viewMonth, entries=[], fixedItems=[], cats=[];
let selectedDay=null, kpRaw='';
let editingEntryId=null, editingFixedId=null, editingCatId=null;
let newCatColor=PALETTE[0], editCatColor=PALETTE[0];

/* ── storage (localStorage) ── */
function load(){
  try{const r=localStorage.getItem('gaegebu_entries');entries=r?JSON.parse(r):[];}catch(e){entries=[];}
  try{const r=localStorage.getItem('gaegebu_fixed');fixedItems=r?JSON.parse(r):[];}catch(e){fixedItems=[];}
  try{const r=localStorage.getItem('gaegebu_cats');cats=r?JSON.parse(r):DEFAULT_CATS.map(c=>({...c}));}catch(e){cats=DEFAULT_CATS.map(c=>({...c}));}
}
function saveEntries(){try{localStorage.setItem('gaegebu_entries',JSON.stringify(entries));}catch(e){}}
function saveFixed(){try{localStorage.setItem('gaegebu_fixed',JSON.stringify(fixedItems));}catch(e){}}
function saveCats(){try{localStorage.setItem('gaegebu_cats',JSON.stringify(cats));}catch(e){}}

/* ── helpers ── */
function fmt(n){return '₩'+Math.round(n).toLocaleString('ko-KR');}
function getCat(name){return cats.find(c=>c.name===name)||{name:'기타',color:'#888780'};}
function todayStr(){const t=new Date();return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function bgClose(id,ev){if(ev.target===document.getElementById(id))closeModal(id);}
function populateCatSelect(id,val){
  const sel=document.getElementById(id);if(!sel)return;
  sel.innerHTML='';
  cats.forEach(c=>{const o=document.createElement('option');o.value=c.name;o.textContent=c.name;sel.appendChild(o);});
  if(val&&[...sel.options].some(o=>o.value===val))sel.value=val;
}

/* ── data ── */
function getMonthEntries(y,m){
  y=y??viewYear;m=m??viewMonth;
  const dim=new Date(y,m+1,0).getDate();
  const fixed=fixedItems.map(f=>{
    const d=Math.min(f.day,dim);
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return{desc:f.desc,amount:f.amount,cat:f.cat,date:ds,isFixed:true,id:'fx_'+f.id+'_'+y+'_'+m};
  });
  const manual=entries.filter(e=>{const[ey,em]=e.date.split('-');return parseInt(ey)===y&&parseInt(em)-1===m;});
  const manualIds=new Set(manual.filter(e=>e.isFixed).map(e=>e.id));
  return [...manual,...fixed.filter(f=>!manualIds.has(f.id))];
}
function getMonthTotal(y,m){return getMonthEntries(y,m).reduce((s,e)=>s+e.amount,0);}

/* ── prev compare ── */
function prevYM(){let py=viewYear,pm=viewMonth-1;if(pm<0){pm=11;py--;}return{y:py,m:pm};}
function renderVsPrev(cid){
  const{y,m}=prevYM();
  const cur=getMonthTotal(viewYear,viewMonth),prev=getMonthTotal(y,m);
  const el=document.getElementById(cid);if(!el)return;
  if(!prev){el.textContent='';return;}
  const diff=cur-prev;
  if(diff===0){el.style.color='var(--text3)';el.textContent='전월과 동일';}
  else if(diff>0){el.style.color='var(--red)';el.textContent='전월 대비 ▲ '+fmt(Math.abs(diff));}
  else{el.style.color='var(--blue)';el.textContent='전월 대비 ▼ '+fmt(Math.abs(diff));}
}

/* ── calendar ── */
function renderCal(){
  const today=new Date();
  const first=new Date(viewYear,viewMonth,1).getDay();
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  const label=`${viewYear}년 ${viewMonth+1}월`;
  document.getElementById('month-label').textContent=label;
  document.getElementById('stats-month-label').textContent=label;
  const all=getMonthEntries();
  const dayMap={};
  all.forEach(e=>{
    const d=parseInt(e.date.split('-')[2]);
    if(!dayMap[d])dayMap[d]={total:0,hasFixed:false};
    dayMap[d].total+=e.amount;
    if(e.isFixed)dayMap[d].hasFixed=true;
  });
  let html='';
  ['일','월','화','수','목','금','토'].forEach(h=>html+=`<div class="cal-head">${h}</div>`);
  for(let i=0;i<first;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const isToday=today.getFullYear()===viewYear&&today.getMonth()===viewMonth&&today.getDate()===d;
    const isSel=selectedDay===d;
    const info=dayMap[d];
    html+=`<div class="cal-day${isToday?' today':''}${info&&info.hasFixed?' has-fixed':''}${isSel?' selected':''}" onclick="selectDay(${d})">
      <span class="dnum">${d}</span>
      ${info?`<span class="damount">₩${Math.round(info.total).toLocaleString()}</span>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  const monthTotal=all.reduce((s,e)=>s+e.amount,0);
  document.getElementById('month-total').textContent=fmt(monthTotal);
  renderVsPrev('vs-prev');
  const tStr=todayStr();
  document.getElementById('today-total').textContent=fmt(all.filter(e=>e.date===tStr).reduce((s,e)=>s+e.amount,0));
  renderDayDetail();
}
function selectDay(d){selectedDay=selectedDay===d?null:d;renderCal();}
function renderDayDetail(){
  const el=document.getElementById('day-detail');
  if(!selectedDay){el.innerHTML='';return;}
  const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}`;
  const items=getMonthEntries().filter(e=>e.date===ds);
  if(!items.length){el.innerHTML=`<div class="empty-msg">${selectedDay}일 지출 없음</div>`;return;}
  const total=items.reduce((s,e)=>s+e.amount,0);
  let html=`<div class="section-title">${selectedDay}일 — ${fmt(total)}</div><div class="entries-list">`;
  items.forEach(e=>{
    const cat=getCat(e.cat);
    html+=`<div class="entry-row">
      <div class="cat-dot" style="background:${cat.color}"></div>
      <div class="info">
        <div class="desc">${e.desc}${e.isFixed?` <span style="font-size:10px;color:var(--text3)">[고정]</span>`:''}</div>
        <div class="meta">${cat.name}</div>
      </div>
      <div class="amt">${fmt(e.amount)}</div>
      ${e.isFixed?'':`
        <button class="icon-btn" onclick="openEdit('${e.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="deleteEntry('${e.id}')"><i class="ti ti-trash"></i></button>
      `}
    </div>`;
  });
  el.innerHTML=html+'</div>';
}

/* ── keypad ── */
function kpPress(v){if(kpRaw.length>=9)return;kpRaw+=v;updateKpDisplay();renderSuggestions();}
function kpDel(){kpRaw=kpRaw.slice(0,-1);updateKpDisplay();renderSuggestions();}
function updateKpDisplay(){
  const el=document.getElementById('kp-display');
  if(!kpRaw){el.textContent='얼마 썼어요?';el.classList.add('placeholder');}
  else{el.textContent='₩'+parseInt(kpRaw).toLocaleString('ko-KR');el.classList.remove('placeholder');}
}
function updateDateLabel(){
  const v=document.getElementById('kp-date').value;
  if(!v){document.getElementById('kp-date-label').textContent='오늘';return;}
  const[,m,d]=v.split('-');
  document.getElementById('kp-date-label').textContent=`${parseInt(m)}월 ${parseInt(d)}일`;
}

/* ── suggestions ── */
function getSuggestions(amt){
  if(!amt||amt<1)return[];
  const map=new Map();
  entries.filter(e=>!e.isFixed&&e.amount===amt&&e.desc&&e.desc!=='지출').forEach(e=>{
    const key=e.desc+'__'+e.cat;
    if(!map.has(key))map.set(key,{desc:e.desc,cat:e.cat,count:0});
    map.get(key).count++;
  });
  fixedItems.filter(f=>f.amount===amt).forEach(f=>{
    const key=f.desc+'__'+f.cat;
    if(!map.has(key))map.set(key,{desc:f.desc,cat:f.cat,count:0});
    map.get(key).count+=5;
  });
  return [...map.values()].sort((a,b)=>b.count-a.count);
}
function renderSuggestions(){
  const amt=kpRaw?parseInt(kpRaw):0;
  const list=getSuggestions(amt);
  const row=document.getElementById('suggest-row');
  if(!list.length){row.innerHTML='';return;}
  window.__suggestions=list;
  row.innerHTML=list.map((s,i)=>{
    const cat=getCat(s.cat);
    return `<button class="suggest-chip" onclick="applySuggestion(${i})">
      <span class="chip-dot" style="background:${cat.color}"></span>
      <span>${s.desc}</span>
    </button>`;
  }).join('');
}
function applySuggestion(idx){
  const s=window.__suggestions[idx];if(!s)return;
  document.getElementById('kp-desc').value=s.desc;
  populateCatSelect('kp-cat',s.cat);
  document.getElementById('suggest-row').innerHTML='';
}

/* ── add / save / delete entry ── */
function openAdd(){
  kpRaw='';
  populateCatSelect('kp-cat');
  const ds=selectedDay
    ?`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}`
    :todayStr();
  document.getElementById('kp-date').value=ds;
  document.getElementById('kp-desc').value='';
  document.getElementById('suggest-row').innerHTML='';
  window.__suggestions=[];
  updateKpDisplay();updateDateLabel();
  document.getElementById('entry-modal').classList.add('open');
}
function saveEntry(){
  const amt=parseInt(kpRaw);
  const desc=document.getElementById('kp-desc').value.trim();
  const cat=document.getElementById('kp-cat').value;
  const date=document.getElementById('kp-date').value;
  if(!amt||!date)return;
  entries.push({id:Date.now().toString(),desc:desc||'지출',amount:amt,cat,date});
  saveEntries();closeModal('entry-modal');renderCal();renderStats();
}
function openEdit(id){
  const e=entries.find(x=>x.id===id);if(!e)return;
  editingEntryId=id;
  populateCatSelect('ed-cat',e.cat);
  document.getElementById('ed-desc').value=e.desc;
  document.getElementById('ed-amt').value=e.amount;
  document.getElementById('ed-date').value=e.date;
  document.getElementById('edit-modal').classList.add('open');
}
function saveEdit(){
  const desc=document.getElementById('ed-desc').value.trim();
  const amt=parseInt(document.getElementById('ed-amt').value);
  const cat=document.getElementById('ed-cat').value;
  const date=document.getElementById('ed-date').value;
  if(!desc||!amt||!date)return;
  const idx=entries.findIndex(x=>x.id===editingEntryId);
  if(idx>-1)entries[idx]={...entries[idx],desc,amount:amt,cat,date};
  saveEntries();closeModal('edit-modal');renderCal();renderStats();
}
function deleteEntry(id){
  entries=entries.filter(e=>e.id!==id);
  saveEntries();renderCal();renderStats();
}

/* ── stats ── */
function renderStats(){
  const all=getMonthEntries();
  const total=all.reduce((s,e)=>s+e.amount,0);
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  document.getElementById('stats-total').textContent=fmt(total);
  document.getElementById('stats-daily').textContent=fmt(Math.round(total/dim));
  renderVsPrev('stats-vs-prev');
  const catMap={};
  all.forEach(e=>{if(!catMap[e.cat])catMap[e.cat]=0;catMap[e.cat]+=e.amount;});
  const sorted=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('cat-chart').innerHTML=sorted.length
    ?sorted.map(([name,amt])=>{const cat=getCat(name);return`<div class="bar-row"><div class="cat-name">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/max*100)}%;background:${cat.color}"></div></div><div class="bar-amt">${fmt(amt)}</div></div>`;}).join('')
    :'<div class="empty-msg">데이터 없음</div>';
}

/* ── fixed ── */
function renderFixed(){
  populateCatSelect('fx-cat');
  document.getElementById('fixed-list').innerHTML=fixedItems.length
    ?fixedItems.map(f=>{
      const cat=getCat(f.cat);
      return`<div class="fixed-row">
        <div style="width:10px;height:10px;border-radius:50%;background:${cat.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.desc}</div>
          <div style="font-size:11px;color:var(--text3)">${cat.name} · ${fmt(f.amount)}</div>
        </div>
        <span class="day-badge">매월 ${f.day}일</span>
        <button class="icon-btn" onclick="openEditFixed('${f.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="deleteFixed('${f.id}')"><i class="ti ti-trash"></i></button>
      </div>`;
    }).join('')
    :'<div class="empty-msg">등록된 고정지출 없음</div>';
}
function addFixed(){
  const desc=document.getElementById('fx-desc').value.trim();
  const amt=parseInt(document.getElementById('fx-amt').value);
  const cat=document.getElementById('fx-cat').value;
  const day=parseInt(document.getElementById('fx-day').value);
  if(!desc||!amt||!day||day<1||day>31)return;
  fixedItems.push({id:Date.now().toString(),desc,amount:amt,cat,day});
  saveFixed();
  document.getElementById('fx-desc').value='';
  document.getElementById('fx-amt').value='';
  document.getElementById('fx-day').value='';
  renderFixed();renderCal();
}
function openEditFixed(id){
  const f=fixedItems.find(x=>x.id===id);if(!f)return;
  editingFixedId=id;
  populateCatSelect('ef-cat',f.cat);
  document.getElementById('ef-desc').value=f.desc;
  document.getElementById('ef-amt').value=f.amount;
  document.getElementById('ef-day').value=f.day;
  document.getElementById('edit-fixed-modal').classList.add('open');
}
function saveEditFixed(){
  const desc=document.getElementById('ef-desc').value.trim();
  const amt=parseInt(document.getElementById('ef-amt').value);
  const cat=document.getElementById('ef-cat').value;
  const day=parseInt(document.getElementById('ef-day').value);
  if(!desc||!amt||!day||day<1||day>31)return;
  const idx=fixedItems.findIndex(x=>x.id===editingFixedId);
  if(idx>-1)fixedItems[idx]={...fixedItems[idx],desc,amount:amt,cat,day};
  saveFixed();closeModal('edit-fixed-modal');renderFixed();renderCal();
}
function deleteFixed(id){
  fixedItems=fixedItems.filter(f=>f.id!==id);
  saveFixed();renderFixed();renderCal();
}

/* ── categories ── */
function buildColorPicker(cid,cur,cb){
  const el=document.getElementById(cid);if(!el)return;
  el.innerHTML='';
  PALETTE.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-opt'+(c===cur?' sel':'');
    d.style.background=c;
    d.onclick=()=>{cb(c);buildColorPicker(cid,c,cb);};
    el.appendChild(d);
  });
}
function renderCats(){
  document.getElementById('cat-list').innerHTML=cats.length
    ?cats.map(c=>`<div class="cat-item">
        <div style="width:18px;height:18px;border-radius:50%;background:${c.color};flex-shrink:0"></div>
        <div style="flex:1;font-size:14px">${c.name}</div>
        <button class="icon-btn" onclick="openEditCat('${c.id}')"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="deleteCat('${c.id}')"><i class="ti ti-trash"></i></button>
      </div>`).join('')
    :'<div class="empty-msg">카테고리 없음</div>';
  buildColorPicker('color-picker-new',newCatColor,c=>{newCatColor=c;});
}
function addCat(){
  const name=document.getElementById('new-cat-name').value.trim();if(!name)return;
  cats.push({id:'c'+Date.now(),name,color:newCatColor});
  saveCats();document.getElementById('new-cat-name').value='';renderCats();
}
function openEditCat(id){
  const cat=cats.find(c=>c.id===id);if(!cat)return;
  editingCatId=id;editCatColor=cat.color;
  document.getElementById('edit-cat-name').value=cat.name;
  buildColorPicker('color-picker-edit',editCatColor,c=>{editCatColor=c;});
  document.getElementById('edit-cat-modal').classList.add('open');
}
function saveEditCat(){
  const name=document.getElementById('edit-cat-name').value.trim();if(!name)return;
  const idx=cats.findIndex(c=>c.id===editingCatId);
  if(idx>-1)cats[idx]={...cats[idx],name,color:editCatColor};
  saveCats();closeModal('edit-cat-modal');renderCats();renderCal();renderStats();
}
function deleteCat(id){cats=cats.filter(c=>c.id!==id);saveCats();renderCats();}

/* ── navigation ── */
function changeMonth(d){
  viewMonth+=d;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  selectedDay=null;renderCal();renderStats();
}
function showTab(t,el){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('screen-'+t).classList.add('active');
  if(t==='stats')renderStats();
  if(t==='fixed')renderFixed();
  if(t==='cats')renderCats();
}

/* ── init ── */
const now=new Date();
viewYear=now.getFullYear();viewMonth=now.getMonth();
load();renderCal();
</script>
