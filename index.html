<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="가계부"/>
<meta name="theme-color" content="#ffffff"/>
<title>가계부</title>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" href="icon.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css"/>
<style>
:root{--bg:#fff;--bg2:#f5f5f5;--bg3:#ebebeb;--text:#111;--text2:#666;--text3:#aaa;--border:rgba(0,0,0,.11);--border2:rgba(0,0,0,.2);--blue:#185FA5;--red:#A32D2D;--green:#2D7A3A;--r:10px;--rl:14px;--safe-bottom:env(safe-area-inset-bottom,0px);--topbar:48px}
@media(prefers-color-scheme:dark){:root{--bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;--text:#f0f0f0;--text2:#999;--text3:#555;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);--blue:#5B9FD4;--red:#D46666;--green:#5DB870}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);font-size:15px;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.topnav{display:flex;border-bottom:.5px solid var(--border);background:var(--bg);flex-shrink:0;height:var(--topbar)}
.tnav{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;font-weight:400}
.tnav i{font-size:17px}.tnav.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding:14px 16px 100px}.page.active{display:block}
.subtab-bar{display:flex;border-bottom:.5px solid var(--border);margin:-14px -16px 16px}
.subtab{flex:1;text-align:center;padding:13px 0;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
.subtab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.subpage{display:none}.subpage.active{display:block}
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mnav button{background:none;border:none;cursor:pointer;font-size:22px;color:var(--text2);padding:4px 12px}
.mnav span{font-size:17px;font-weight:500}
.scard{background:var(--bg2);border-radius:var(--r);padding:13px 15px;margin-bottom:8px}
.scard .lbl{font-size:12px;color:var(--text2);margin-bottom:3px}
.scard .val{font-size:22px;font-weight:500;margin-bottom:3px}
.scard .sub{font-size:12px}
.scard-sm{background:var(--bg2);border-radius:var(--r);padding:10px 15px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.scard-sm .lbl{font-size:12px;color:var(--text2)}.scard-sm .val{font-size:15px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px}
.ch{text-align:center;font-size:11px;color:var(--text3);padding:3px 0}
.cd{min-height:50px;border-radius:7px;padding:3px;cursor:pointer;border:.5px solid transparent;display:flex;flex-direction:column}
.cd:active{background:var(--bg2)}.cd.today{border-color:var(--border2)}.cd.sel{background:var(--bg2);border-color:var(--border2)}
.cd .dn{font-size:12px;line-height:1.4}.cd .da{font-size:8.5px;color:var(--blue);font-weight:500;margin-top:2px;line-height:1.3}
.cd.mt0{cursor:default}
.sec-title{font-size:13px;color:var(--text2);margin:12px 0 7px;font-weight:500}
.elist{display:flex;flex-direction:column;gap:6px}
.erow{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);cursor:pointer}
.erow:active{background:var(--bg2)}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.einfo{flex:1;min-width:0}
.edesc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:11px;color:var(--text3);margin-top:2px}
.eamt{font-size:14px;font-weight:500;color:var(--blue);flex-shrink:0}
.pbadge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.scheck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.scheck.done{background:var(--green);border-color:var(--green)}.scheck i{font-size:13px;color:var(--text3)}.scheck.done i{color:#fff}
.settle-item{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:10px;transition:opacity .2s}
.settle-item.done-row{opacity:.35}
.si-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.si-desc{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-meta{font-size:11px;color:var(--text3)}
.si-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.si-amt{font-size:14px;font-weight:500;color:var(--blue)}
.si-owe-amt{font-size:11px;font-weight:600;color:var(--red)}
.si-owe-amt.settled{color:var(--text3);text-decoration:line-through}
.bars{display:flex;flex-direction:column;gap:10px}
.brow{display:flex;align-items:center;gap:8px}
.bname{font-size:12px;width:56px;flex-shrink:0;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;height:15px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px}
.bamt{font-size:11px;color:var(--text2);min-width:60px;text-align:right}
.catrow{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--r);margin-bottom:7px}
.catrow .cname{flex:1;font-size:14px}
.iBtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:17px;padding:2px 4px}
.fbox{display:flex;flex-direction:column;gap:9px;padding:13px;background:var(--bg2);border-radius:var(--rl);margin-bottom:13px}
.fbox input,.fbox select{width:100%;font-size:14px;padding:9px 11px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);-webkit-appearance:none;appearance:none}
.btn-p{background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:12px;font-size:15px;cursor:pointer;font-weight:500;width:100%}
.btn-s{background:none;border:.5px solid var(--border2);border-radius:var(--r);padding:12px;font-size:15px;cursor:pointer;color:var(--text2);width:100%}
.btn-d{background:none;border:.5px solid var(--border2);border-radius:var(--r);padding:12px;font-size:15px;cursor:pointer;color:var(--red);width:100%}
.cgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;padding:5px 0}
.copt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2.5px solid transparent}.copt.sel{border-color:var(--text)}
.empty{text-align:center;color:var(--text3);font-size:13px;padding:22px 0}
.mwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;max-width:480px;margin:0 auto}
.mwrap.open{display:flex}
.modal{background:var(--bg);border-radius:18px 18px 0 0;padding:20px 16px;padding-bottom:calc(20px + var(--safe-bottom));width:100%;max-height:92vh;overflow-y:auto}
.mtitle{font-size:16px;font-weight:500;margin-bottom:14px}
.kp-top{text-align:center;padding:6px 0 10px}
.kp-lbl{font-size:12px;color:var(--text2);margin-bottom:5px}
.kp-amt{font-size:36px;font-weight:500;min-height:46px;letter-spacing:-1px}.kp-amt.ph{color:var(--text3)}
.sugrow{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;padding:2px 0 10px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;background:var(--bg2);border:.5px solid var(--border2);border-radius:18px;cursor:pointer;font-size:13px;color:var(--text)}
.chip:active{opacity:.6}
.chipdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.kp-meta{display:flex;flex-direction:column;gap:8px;padding:4px 0 10px}
.kp-meta input,.kp-meta select{width:100%;font-size:14px;padding:9px 11px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);-webkit-appearance:none;appearance:none}
.kp-meta select.err{border-color:var(--red)!important}
.kpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:9px}
.kb{height:54px;border:none;background:var(--bg2);border-radius:var(--r);font-size:21px;font-weight:500;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center}
.kb:active{opacity:.55}.kb.z{grid-column:span 2}
.ka{display:grid;grid-template-columns:1fr 2fr;gap:8px}
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.ftab{flex:1;padding:8px;text-align:center;font-size:13px;border-radius:var(--r);background:var(--bg2);cursor:pointer;color:var(--text2)}
.ftab.active{background:var(--text);color:var(--bg)}
.room-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:.5px solid var(--border);padding:6px 16px;display:flex;justify-content:space-between;align-items:center;z-index:50;font-size:11px;color:var(--text3);padding-bottom:calc(6px + var(--safe-bottom))}
</style>
</head>
<body>
<div class="topnav">
  <div class="tnav active" onclick="showTab('cal',this)"><i class="ti ti-calendar"></i> 달력</div>
  <div class="tnav" onclick="showTab('stat',this)"><i class="ti ti-chart-bar"></i> 통계</div>
  <div class="tnav" onclick="showTab('settle',this)"><i class="ti ti-arrows-exchange"></i> 정산</div>
  <div class="tnav" onclick="showTab('cfg',this)"><i class="ti ti-settings"></i> 설정</div>
</div>
<div class="pages">
<!-- 달력 -->
<div id="page-cal" class="page active">
  <div class="mnav"><button onclick="changeMonth(-1)">&#8249;</button><span id="cal-label"></span><button onclick="changeMonth(1)">&#8250;</button></div>
  <div class="scard"><div class="lbl">이번 달 지출</div><div class="val" id="month-total">&#8361;0</div><div class="sub" id="vs-prev"></div></div>
  <div class="scard-sm"><div class="lbl">오늘 지출</div><div class="val" id="today-total">&#8361;0</div></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="day-detail"></div>
  <div style="display:flex;justify-content:flex-end;padding:12px 0 4px">
    <button onclick="openAdd()" style="width:52px;height:52px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 14px rgba(0,0,0,.2)">+</button>
  </div>
</div>
<!-- 통계 -->
<div id="page-stat" class="page">
  <div class="mnav"><button onclick="changeMonth(-1)">&#8249;</button><span id="stat-label"></span><button onclick="changeMonth(1)">&#8250;</button></div>
  <div class="scard"><div class="lbl">총 지출</div><div class="val" id="stat-total">&#8361;0</div><div class="sub" id="stat-vs-prev"></div></div>
  <div class="scard-sm" style="margin-bottom:14px"><div class="lbl">일평균</div><div class="val" id="stat-daily">&#8361;0</div></div>
  <div class="sec-title">카테고리별 지출</div>
  <div class="bars" id="cat-bars"></div>
</div>
<!-- 정산 -->
<div id="page-settle" class="page">
  <div class="mnav"><button onclick="changeMonth(-1)">&#8249;</button><span id="settle-label"></span><button onclick="changeMonth(1)">&#8250;</button></div>
  <div class="filter-row">
    <div class="ftab active" onclick="setSettleFilter('unsettled',this)">정산 필요</div>
    <div class="ftab" onclick="setSettleFilter('all',this)">전체 내역</div>
  </div>
  <div id="settle-list" style="display:flex;flex-direction:column;gap:8px"></div>
</div>
<!-- 설정 -->
<div id="page-cfg" class="page" style="padding-top:0">
  <div class="subtab-bar">
    <div class="subtab active" onclick="showSubTab('members',this)">멤버</div>
    <div class="subtab" onclick="showSubTab('cats',this)">카테고리</div>
  </div>
  <div id="sub-members" class="subpage active">
    <div id="member-list"></div>
    <div class="fbox">
      <input id="nm-name" placeholder="멤버 이름"/>
      <div style="font-size:13px;color:var(--text2)">색상</div>
      <div class="cgrid" id="nm-colors"></div>
      <button class="btn-p" onclick="addMember()">멤버 추가</button>
    </div>
  </div>
  <div id="sub-cats" class="subpage">
    <div id="cat-list"></div>
    <div class="fbox">
      <input id="nc-name" placeholder="카테고리 이름"/>
      <div style="font-size:13px;color:var(--text2)">색상</div>
      <div class="cgrid" id="nc-colors"></div>
      <button class="btn-p" onclick="addCat()">카테고리 추가</button>
    </div>
  </div>
</div>
</div>
<!-- 지출 추가 모달 -->
<div class="mwrap" id="m-add" onclick="bgClose('m-add',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="kp-top"><div class="kp-lbl" id="kp-datelbl">오늘</div><div class="kp-amt ph" id="kp-disp">How much?</div></div>
    <div class="sugrow" id="sugrow"></div>
    <div class="kp-meta">
      <select id="kp-payer"><option value="">Who?</option></select>
      <input id="kp-desc" placeholder="What for?"/>
      <select id="kp-cat"></select>
      <input id="kp-date" type="date" onchange="updateDateLbl()"/>
    </div>
    <div class="kpad">
      <button class="kb" onclick="kp('1')">1</button><button class="kb" onclick="kp('2')">2</button><button class="kb" onclick="kp('3')">3</button>
      <button class="kb" onclick="kp('4')">4</button><button class="kb" onclick="kp('5')">5</button><button class="kb" onclick="kp('6')">6</button>
      <button class="kb" onclick="kp('7')">7</button><button class="kb" onclick="kp('8')">8</button><button class="kb" onclick="kp('9')">9</button>
      <button class="kb z" onclick="kp('0')">0</button><button class="kb" onclick="kpDel()"><i class="ti ti-backspace"></i></button>
    </div>
    <div class="ka"><button class="btn-s" onclick="closeM('m-add')">취소</button><button class="btn-p" onclick="saveAdd()">등록</button></div>
  </div>
</div>
<!-- 지출 수정 모달 -->
<div class="mwrap" id="m-edit" onclick="bgClose('m-edit',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle">지출 수정</div>
    <div class="fbox" style="background:none;padding:0;margin-bottom:10px">
      <input id="ed-amt" type="number" inputmode="numeric" placeholder="금액"/>
      <input id="ed-desc" placeholder="내역"/>
      <select id="ed-payer"></select>
      <select id="ed-cat"></select>
      <input id="ed-date" type="date"/>
      <div style="display:flex;align-items:center;gap:10px;padding:4px 2px;cursor:pointer" onclick="toggleEditSettle()">
        <div id="ed-settle-check"></div>
        <span style="font-size:13px;color:var(--text2)">정산 완료</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-p" onclick="saveEdit()">저장</button>
      <button class="btn-d" onclick="deleteEntry()">삭제</button>
      <button class="btn-s" onclick="closeM('m-edit')">취소</button>
    </div>
  </div>
</div>
<!-- 카테고리 내역 모달 -->
<div class="mwrap" id="m-catdetail" onclick="bgClose('m-catdetail',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div id="cd-dot" style="width:12px;height:12px;border-radius:50%;flex-shrink:0"></div>
      <div class="mtitle" id="cd-title" style="margin-bottom:0;flex:1"></div>
      <div style="font-size:15px;font-weight:500;color:var(--blue)" id="cd-total"></div>
    </div>
    <div class="elist" id="cd-list"></div>
    <div style="margin-top:14px"><button class="btn-s" onclick="closeM('m-catdetail')">닫기</button></div>
  </div>
</div>
<!-- 카테고리 수정 모달 -->
<div class="mwrap" id="m-cat" onclick="bgClose('m-cat',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle">카테고리 수정</div>
    <div class="fbox" style="background:none;padding:0;margin-bottom:10px">
      <input id="ec-name" placeholder="카테고리 이름"/>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">색상</div>
      <div class="cgrid" id="ec-colors"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-p" onclick="saveEditCat()">저장</button>
      <button class="btn-d" onclick="deleteCat()">삭제</button>
      <button class="btn-s" onclick="closeM('m-cat')">취소</button>
    </div>
  </div>
</div>
<!-- 멤버 수정 모달 -->
<div class="mwrap" id="m-member" onclick="bgClose('m-member',event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle">멤버 수정</div>
    <div class="fbox" style="background:none;padding:0;margin-bottom:10px">
      <input id="em-name" placeholder="멤버 이름"/>
      <div style="font-size:13px;color:var(--text2);margin-bottom:4px">색상</div>
      <div class="cgrid" id="em-colors"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn-p" onclick="saveEditMember()">저장</button>
      <button class="btn-d" onclick="deleteMember()">삭제</button>
      <button class="btn-s" onclick="closeM('m-member')">취소</button>
    </div>
  </div>
</div>
<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {getFirestore,doc,getDoc,setDoc,onSnapshot,collection,addDoc,updateDoc,deleteDoc} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyDrPnlBkLLs-y_DgiMwq-yNK2GxtUPG03Q",authDomain:"spendingbook-b1b66.firebaseapp.com",projectId:"spendingbook-b1b66",storageBucket:"spendingbook-b1b66.firebasestorage.app",messagingSenderId:"847353199307",appId:"1:847353199307:web:2e27e562f1741d187a794e"};
const app=initializeApp(FB);
const db=getFirestore(app);

const PAL=['#E9F056','#FF5C34','#D7EFFF','#351E28','#AEB8A0','#B8F2D6','#7DD3FC','#B8A8FF','#F4B6C2','#FFC6A8','#FFE27A','#3E6B48','#2563EB','#FF7A90','#D8C3A5','#871014','#81C028','#8E6E7A'];
const DEF_CATS=[{id:'c1',name:'식비',color:'#FF5C34'},{id:'c2',name:'교통',color:'#2563EB'},{id:'c3',name:'카페',color:'#FFE27A'},{id:'c4',name:'쇼핑',color:'#F4B6C2'},{id:'c5',name:'문화',color:'#B8A8FF'},{id:'c6',name:'의료',color:'#7DD3FC'},{id:'c7',name:'구독',color:'#81C028'},{id:'c8',name:'기타',color:'#AEB8A0'}];
const DEF_MEMBERS=[{id:'m1',name:'나',color:'#2563EB'},{id:'m2',name:'친구',color:'#FF5C34'}];

let ROOM=localStorage.getItem('gb_room')||null;
let vY,vM,entries=[],cats=[],members=[];
let selDay=null,kpRaw='';
let editId=null,editCatId=null,editMemberId=null;
let ncColor=PAL[0],ecColor=PAL[0],nmColor=PAL[6],emColor=PAL[6];
let settleFilter='unsettled',editSettled=false;
let unsub=null;

// ── Firebase helpers ──
const rRef=()=>doc(db,'rooms',ROOM);
const eRef=()=>collection(db,'rooms',ROOM,'entries');

async function fbLoad(){
  const s=await getDoc(rRef());
  if(s.exists()){
    const d=s.data();
    cats=d.cats||DEF_CATS.map(c=>({...c}));
    members=d.members||DEF_MEMBERS.map(m=>({...m}));
  } else {
    cats=DEF_CATS.map(c=>({...c}));
    members=DEF_MEMBERS.map(m=>({...m}));
  }
  if(!cats.find(c=>c.id==='c8'))cats.push({id:'c8',name:'기타',color:'#AEB8A0'});
  if(unsub)unsub();
  unsub=onSnapshot(eRef(),snap=>{
    entries=snap.docs.map(d=>({...d.data(),_docId:d.id}));

// ── helpers ──
function fmt(n){return '₩'+Math.round(n).toLocaleString('ko-KR');}
function getCat(name){return cats.find(c=>c.name===name)||cats.find(c=>c.id==='c8')||{name:'기타',color:'#888'};}
function getMember(name){return members.find(m=>m.name===name)||null;}
function todayStr(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function closeM(id){document.getElementById(id).classList.remove('open');}
function bgClose(id,ev){if(ev.target===document.getElementById(id))closeM(id);}
function bc(color){const h=color.replace('#','');const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);return(r*299+g*587+b*114)/1000>128?'#111':'#fff';}
function badge(name){if(!name)return'';const m=getMember(name);const c=m?m.color:'#aaa';return'<span class="pbadge" style="background:'+c+';color:'+bc(c)+'">'+name+'</span>';}
function popCat(id,val){const s=document.getElementById(id);if(!s)return;s.innerHTML='';cats.forEach(c=>{const o=document.createElement('option');o.value=c.name;o.textContent=c.name;s.appendChild(o);});if(val&&[...s.options].some(o=>o.value===val))s.value=val;}
function popMember(id,val){const s=document.getElementById(id);if(!s)return;s.innerHTML='<option value="">Who?</option>';members.forEach(m=>{const o=document.createElement('option');o.value=m.name;o.textContent=m.name;s.appendChild(o);});if(val&&[...s.options].some(o=>o.value===val))s.value=val;}
function getMonthEntries(y,m){y=y??vY;m=m??vM;return entries.filter(e=>{const[ey,em]=e.date.split('-');return parseInt(ey)===y&&parseInt(em)-1===m;});}
function getMonthTotal(y,m){return getMonthEntries(y,m).reduce((s,e)=>s+e.amount,0);}
function prevYM(){let py=vY,pm=vM-1;if(pm<0){pm=11;py--;}return{y:py,m:pm};}
function renderVsPrev(id){
  const{y,m}=prevYM();const cur=getMonthTotal(vY,vM),prev=getMonthTotal(y,m);
  const el=document.getElementById(id);if(!el)return;
  if(!prev){el.textContent='';return;}
  const diff=cur-prev;
  if(diff===0){el.style.color='var(--text3)';el.textContent='전월과 동일';}
  else if(diff>0){el.style.color='var(--red)';el.textContent='전월 대비 ▲ '+fmt(Math.abs(diff));}
  else{el.style.color='var(--blue)';el.textContent='전월 대비 ▼ '+fmt(Math.abs(diff));}
}

// ── 달력 ──
function renderCal(){
  const today=new Date();
  const first=new Date(vY,vM,1).getDay();
  const days=new Date(vY,vM+1,0).getDate();
  const lbl=vY+'년 '+(vM+1)+'월';
  document.getElementById('cal-label').textContent=lbl;
  document.getElementById('stat-label').textContent=lbl;
  const all=getMonthEntries();
  const dm={};all.forEach(e=>{const d=parseInt(e.date.split('-')[2]);if(!dm[d])dm[d]=0;dm[d]+=e.amount;});
  let h='';
  ['일','월','화','수','목','금','토'].forEach(x=>h+='<div class="ch">'+x+'</div>');
  for(let i=0;i<first;i++)h+='<div class="cd mt0"></div>';
  for(let d=1;d<=days;d++){
    const iT=today.getFullYear()===vY&&today.getMonth()===vM&&today.getDate()===d;
    const iS=selDay===d;
    h+='<div class="cd'+(iT?' today':'')+(iS?' sel':'')+'" onclick="selD('+d+')"><span class="dn">'+d+'</span>'+(dm[d]?'<span class="da">₩'+Math.round(dm[d]).toLocaleString()+'</span>':'')+'</div>';
  }
  document.getElementById('cal-grid').innerHTML=h;
  document.getElementById('month-total').textContent=fmt(all.reduce((s,e)=>s+e.amount,0));
  renderVsPrev('vs-prev');
  const ts=todayStr();
  document.getElementById('today-total').textContent=fmt(all.filter(e=>e.date===ts).reduce((s,e)=>s+e.amount,0));
  renderDayDetail();
}
window.selD=function(d){selDay=selDay===d?null:d;renderCal();};
function renderDayDetail(){
  const el=document.getElementById('day-detail');
  if(!selDay){el.innerHTML='';return;}
  const ds=vY+'-'+String(vM+1).padStart(2,'0')+'-'+String(selDay).padStart(2,'0');
  const items=getMonthEntries().filter(e=>e.date===ds);
  if(!items.length){el.innerHTML='<div class="empty">'+selDay+'일 지출 없음</div>';return;}
  const total=items.reduce((s,e)=>s+e.amount,0);
  let h='<div class="sec-title">'+selDay+'일 — '+fmt(total)+'</div><div class="elist">';
  items.forEach(e=>{
    const cat=getCat(e.cat);
    h+='<div class="erow" onclick="openEdit(\''+e.id+'\')"><div class="cdot" style="background:'+cat.color+'"></div><div class="einfo"><div class="edesc">'+e.desc+'</div><div class="emeta">'+cat.name+(e.settled?' · 정산완료':'')+'</div></div><div class="eamt">'+fmt(e.amount)+'</div>'+(e.payer?badge(e.payer):'')+' <i class="ti ti-chevron-right" style="color:var(--text3);font-size:15px"></i></div>';
  });
  el.innerHTML=h+'</div>';
}

function renderSug(){
  const amt=kpRaw?parseInt(kpRaw):0;if(!amt){document.getElementById('sugrow').innerHTML='';return;}
  const map=new Map();
  entries.filter(e=>e.amount===amt&&e.desc&&e.desc!=='지출').forEach(e=>{const k=e.desc+'__'+e.cat;if(!map.has(k))map.set(k,{desc:e.desc,cat:e.cat,count:0});map.get(k).count++;});
  const list=[...map.values()].sort((a,b)=>b.count-a.count);
  if(!list.length){document.getElementById('sugrow').innerHTML='';return;}
  window.__sug=list;
  document.getElementById('sugrow').innerHTML=list.map((s,i)=>{const cat=getCat(s.cat);return'<button class="chip" onclick="applySug('+i+')"><span class="chipdot" style="background:'+cat.color+'"></span><span>'+s.desc+'</span></button>';}).join('');
}

function renderStats(){
